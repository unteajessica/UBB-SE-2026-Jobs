<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CV</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; color: #222; background: #fff; padding: 32px; }
  .header { border-bottom: 3px solid #2563eb; padding-bottom: 16px; margin-bottom: 20px; }
  .header h1 { font-size: 28px; color: #1e3a8a; }
  .header .contact { margin-top: 6px; color: #555; font-size: 12px; }
  .header .contact span { margin-right: 16px; }
  .section { margin-bottom: 20px; }
  .section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #2563eb; border-bottom: 1px solid #dbeafe; padding-bottom: 4px; margin-bottom: 10px; }
  .entry { margin-bottom: 10px; }
  .entry strong { font-size: 13px; }
  .entry em { font-size: 11px; color: #666; }
  .entry p { margin-top: 3px; color: #444; }
  .links a { color: #2563eb; text-decoration: none; margin-right: 12px; font-size: 12px; }
  .motivation { font-style: italic; color: #555; }
</style>
</head>
<body>
  <div class="header">
    <h1>{{FIRST_NAME}} {{LAST_NAME}}</h1>
    <div class="contact">
      <span>{{EMAIL}}</span>
      <span>{{PHONE}}</span>
      <span>{{CITY}}, {{COUNTRY}}</span>
      <span>{{UNIVERSITY}}</span>
    </div>
    <div class="links" style="margin-top:6px;">
      <a href="{{LINKEDIN}}">LinkedIn</a>
      <a href="{{GITHUB}}">GitHub</a>
    </div>
  </div>

  <div class="section">
    <h2>About</h2>
    <p class="motivation">{{MOTIVATION}}</p>
  </div>

  <div class="section">
    <h2>Skills</h2>
    <p>{{SKILLS}}</p>
  </div>

  <div class="section">
    <h2>Work Experience</h2>
    {{WORK_EXPERIENCE}}
  </div>

  <div class="section">
    <h2>Projects</h2>
    {{PROJECTS}}
  </div>

  <div class="section">
    <h2>Activities</h2>
    {{ACTIVITIES}}
  </div>
</body>
</html>
